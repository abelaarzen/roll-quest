<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidequest Wizard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #008080;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    font-family: 'Comic Sans MS', 'Comic Sans', cursive;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* Classic Windows window chrome */
  .window {
    background: #c0c0c0;
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    width: 100%;
    max-width: 560px;
    box-shadow: 2px 2px 0 #000000;
  }

  .title-bar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    font-weight: bold;
    font-size: 0.85rem;
    padding: 3px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }

  .title-bar-left {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .title-bar-icon {
    font-size: 1rem;
  }

  .title-bar-buttons {
    display: flex;
    gap: 2px;
  }

  .tb-btn {
    background: #c0c0c0;
    border-top: 1px solid #ffffff;
    border-left: 1px solid #ffffff;
    border-right: 1px solid #404040;
    border-bottom: 1px solid #404040;
    width: 16px;
    height: 14px;
    font-size: 0.6rem;
    line-height: 1;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-family: 'Comic Sans MS', cursive;
    font-weight: bold;
  }

  .menu-bar {
    background: #c0c0c0;
    padding: 2px 4px;
    font-size: 0.8rem;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid #808080;
  }

  .menu-item {
    padding: 1px 6px;
    cursor: default;
    color: #000;
  }

  .menu-item:hover {
    background: #000080;
    color: #fff;
  }

  /* Toolbar */
  .toolbar {
    background: #c0c0c0;
    padding: 4px 6px;
    display: flex;
    gap: 4px;
    align-items: center;
    border-bottom: 1px solid #808080;
    flex-wrap: wrap;
  }

  .tool-btn {
    background: #c0c0c0;
    border-top: 1px solid #ffffff;
    border-left: 1px solid #ffffff;
    border-right: 1px solid #404040;
    border-bottom: 1px solid #404040;
    width: 24px;
    height: 24px;
    font-size: 0.85rem;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tool-sep {
    width: 1px;
    height: 20px;
    background: #808080;
    margin: 0 2px;
  }

  /* Canvas area */
  .canvas-area {
    background: #c0c0c0;
    padding: 8px;
  }

  .paint-canvas {
    background: white;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* Wizard image */
  .wizard-wrap {
    position: relative;
    cursor: default;
    display: inline-block;
  }

  .wizard-img {
    width: 100%;
    max-width: 480px;
    height: auto;
    image-rendering: pixelated;
    display: block;
  }

  .wizard-wrap:active .wizard-img {
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #808080;
    border-bottom: 2px solid #808080;
  }

  /* Title */
  h1 {
    font-size: clamp(1.3rem, 5vw, 1.9rem);
    font-weight: bold;
    color: #000080;
    text-align: center;
    text-shadow: 2px 2px 0 #c0c0c0, 3px 3px 0 #808080;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 0.9rem;
    color: #800080;
    text-align: center;
    margin-top: -8px;
  }

  /* The quest button */
  .quest-btn {
    font-family: 'Comic Sans MS', 'Comic Sans', cursive;
    font-weight: bold;
    font-size: 1rem;
    color: #000000;
    background: #c0c0c0;
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    padding: 6px 20px;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 1px 1px 0 #000;
  }

  .quest-btn:hover {
    background: #d0d0d0;
  }

  .quest-btn:active {
    border-top: 2px solid #404040;
    border-left: 2px solid #404040;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
    box-shadow: none;
    padding: 7px 19px 5px 21px;
  }

  /* Quest card */
  .quest-card {
    width: 100%;
    background: white;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
    padding: 14px 16px;
    display: none;
    text-align: left;
    position: relative;
  }

  .quest-card.visible {
    display: block;
  }

  .quest-category {
    font-size: 0.75rem;
    font-weight: bold;
    color: #ffffff;
    background: #000080;
    padding: 1px 6px;
    display: inline-block;
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .quest-text {
    font-size: 1.05rem;
    line-height: 1.5;
    color: #000000;
    margin-bottom: 10px;
  }

  .quest-difficulty {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.8rem;
    color: #808080;
  }

  .quest-difficulty .pip {
    width: 12px;
    height: 12px;
    background: #c0c0c0;
    border-top: 1px solid #808080;
    border-left: 1px solid #808080;
    border-right: 1px solid #ffffff;
    border-bottom: 1px solid #ffffff;
  }

  .quest-difficulty .pip.active {
    background: #ff0000;
    border-top: 1px solid #ff8080;
    border-left: 1px solid #ff8080;
    border-right: 1px solid #800000;
    border-bottom: 1px solid #800000;
  }

  /* MS Paint color palette */
  .palette-bar {
    background: #c0c0c0;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    gap: 2px;
    border-top: 1px solid #808080;
    flex-wrap: wrap;
  }

  .palette-swatch {
    width: 14px;
    height: 14px;
    border-top: 1px solid #808080;
    border-left: 1px solid #808080;
    border-right: 1px solid #ffffff;
    border-bottom: 1px solid #ffffff;
    cursor: default;
    flex-shrink: 0;
  }

  /* Status bar */
  .status-bar {
    background: #c0c0c0;
    padding: 2px 6px;
    font-size: 0.7rem;
    color: #000;
    display: flex;
    gap: 8px;
    border-top: 1px solid #808080;
  }

  .status-panel {
    border-top: 1px solid #808080;
    border-left: 1px solid #808080;
    border-right: 1px solid #ffffff;
    border-bottom: 1px solid #ffffff;
    padding: 1px 6px;
  }

  /* Pixel sparkle */
  .px-spark {
    position: fixed;
    width: 4px;
    height: 4px;
    pointer-events: none;
    image-rendering: pixelated;
    animation: px-fly 0.6s steps(6) forwards;
    z-index: 9999;
  }

  @keyframes px-fly {
    0%   { opacity: 1; transform: translate(0,0); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)); }
  }
</style>
</head>
<body>

<div class="window">

  <!-- Title bar -->
  <div class="title-bar">
    <div class="title-bar-left">
      <span class="title-bar-icon">🧙</span>
      <span>Sidequest Wizard - Paint</span>
    </div>
    <div class="title-bar-buttons">
      <div class="tb-btn">_</div>
      <div class="tb-btn">□</div>
      <div class="tb-btn">✕</div>
    </div>
  </div>

  <!-- Menu bar -->
  <div class="menu-bar">
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">View</span>
    <span class="menu-item">Quest</span>
    <span class="menu-item">Help</span>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="tool-btn" title="Select">⬚</div>
    <div class="tool-btn" title="Pencil">✏️</div>
    <div class="tool-btn" title="Fill">🪣</div>
    <div class="tool-btn" title="Text">A</div>
    <div class="tool-sep"></div>
    <div class="tool-btn" title="Eraser">◻</div>
    <div class="tool-btn" title="Magnify">🔍</div>
    <div class="tool-btn" title="Brush">🖌️</div>
    <div class="tool-sep"></div>
    <div class="tool-btn" title="Spray">💨</div>
    <div class="tool-btn" title="Line">╱</div>
    <div class="tool-btn" title="Rectangle">▭</div>
  </div>

  <!-- Canvas -->
  <div class="canvas-area">
    <div class="paint-canvas">

      <div class="wizard-wrap" id="wizardWrap">
        <img class="wizard-img" src="wizard.jpg" alt="The Sidequest Wizard" />
      </div>

      <h1>Sidequest Wizard</h1>
      <p class="subtitle">~ Every day holds a hidden quest ~</p>

      <button class="quest-btn" id="questBtn" onclick="rollQuest()">
        ✦ Reveal My Sidequest ✦
      </button>

      <div class="quest-card" id="questCard">
        <div class="quest-category" id="questCat"></div>
        <div class="quest-text" id="questText"></div>
        <div class="quest-difficulty" id="questDiff"></div>
      </div>

    </div>
  </div>

  <!-- Color palette -->
  <div class="palette-bar">
    <div class="palette-swatch" style="background:#000000"></div>
    <div class="palette-swatch" style="background:#808080"></div>
    <div class="palette-swatch" style="background:#800000"></div>
    <div class="palette-swatch" style="background:#ff0000"></div>
    <div class="palette-swatch" style="background:#ff8000"></div>
    <div class="palette-swatch" style="background:#ffff00"></div>
    <div class="palette-swatch" style="background:#008000"></div>
    <div class="palette-swatch" style="background:#00ff00"></div>
    <div class="palette-swatch" style="background:#008080"></div>
    <div class="palette-swatch" style="background:#00ffff"></div>
    <div class="palette-swatch" style="background:#000080"></div>
    <div class="palette-swatch" style="background:#0000ff"></div>
    <div class="palette-swatch" style="background:#800080"></div>
    <div class="palette-swatch" style="background:#ff00ff"></div>
    <div class="palette-swatch" style="background:#804000"></div>
    <div class="palette-swatch" style="background:#ff8080"></div>
    <div class="palette-swatch" style="background:#c0c0c0"></div>
    <div class="palette-swatch" style="background:#ffffff; border-color:#808080 #fff #fff #808080"></div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-panel" id="statusText">Ready</div>
    <div class="status-panel" id="statusCoords">0, 0</div>
    <div class="status-panel">420x420</div>
  </div>

</div>

<script>
const quests = [
  // Exploration
  { cat: "Exploration", text: "Walk to the nearest body of water you've never visited. Sit there for 10 minutes.", diff: 1 },
  { cat: "Exploration", text: "Find a street in your city you've never been to. Walk the entire length of it.", diff: 1 },
  { cat: "Exploration", text: "Visit a shop you've walked past a hundred times but never entered.", diff: 1 },
  { cat: "Exploration", text: "Find the oldest building in your neighborhood. Learn one thing about its history.", diff: 2 },
  { cat: "Exploration", text: "Take a bus or train to a random stop you've never been to. Explore for an hour.", diff: 2 },
  { cat: "Exploration", text: "Find the highest publicly accessible point near you. Go see the view.", diff: 2 },

  // Creative
  { cat: "Creative", text: "Draw a map of your day from memory tonight — every place you went, every turn.", diff: 1 },
  { cat: "Creative", text: "Write a one-page letter to your future self, one year from now.", diff: 1 },
  { cat: "Creative", text: "Photograph 5 things that are the same color. Make a collage.", diff: 2 },
  { cat: "Creative", text: "Learn to fold one origami animal you've never made. Give it to someone.", diff: 2 },
  { cat: "Creative", text: "Compose a 4-line poem about the last meal you ate.", diff: 1 },
  { cat: "Creative", text: "Sketch a stranger's shoes from memory after seeing them once.", diff: 2 },

  // Social
  { cat: "Social", text: "Ask someone older than you for their best piece of life advice.", diff: 1 },
  { cat: "Social", text: "Send a message to a friend you haven't spoken to in over 6 months.", diff: 1 },
  { cat: "Social", text: "Compliment a stranger on something specific and genuine.", diff: 2 },
  { cat: "Social", text: "Have a conversation with someone without looking at your phone once.", diff: 1 },
  { cat: "Social", text: "Cook a meal for someone else. Don't tell them why.", diff: 2 },
  { cat: "Social", text: "Learn the name of someone you see regularly but have never spoken to.", diff: 2 },

  // Challenge
  { cat: "Challenge", text: "Do something with your non-dominant hand for an entire hour.", diff: 2 },
  { cat: "Challenge", text: "Go an entire day without any screens after 8pm.", diff: 3 },
  { cat: "Challenge", text: "Take a cold shower. Stay in for 2 minutes.", diff: 2 },
  { cat: "Challenge", text: "Learn 10 words in a language you don't speak. Use one in a sentence by tonight.", diff: 2 },
  { cat: "Challenge", text: "Run or walk 5km without music or podcasts. Just you and your thoughts.", diff: 2 },
  { cat: "Challenge", text: "Sit in complete silence for 20 minutes. No phone, no distractions.", diff: 3 },

  // Craft
  { cat: "Craft", text: "Fix something small that's been broken for a while. A button, a hinge, a hem.", diff: 1 },
  { cat: "Craft", text: "Build something useful out of materials you already have at home.", diff: 3 },
  { cat: "Craft", text: "Sharpen every dull knife in your kitchen. Properly.", diff: 2 },
  { cat: "Craft", text: "Organize one drawer, shelf, or corner that's been chaotic for too long.", diff: 1 },
  { cat: "Craft", text: "Learn one knot you don't know. Tie it 20 times until it's muscle memory.", diff: 2 },

  // Culinary
  { cat: "Culinary", text: "Cook something you've never attempted before. No recipe shortcuts.", diff: 3 },
  { cat: "Culinary", text: "Visit a grocery store and buy one ingredient you've never used. Cook with it tonight.", diff: 2 },
  { cat: "Culinary", text: "Eat a meal somewhere you've never eaten before. No looking at reviews first.", diff: 1 },
  { cat: "Culinary", text: "Make bread from scratch. Just flour, water, salt, yeast, and patience.", diff: 3 },
  { cat: "Culinary", text: "Drink only water today. Notice how things taste differently.", diff: 2 },

  // Nature
  { cat: "Nature", text: "Identify three plants or trees near your home. Learn their actual names.", diff: 1 },
  { cat: "Nature", text: "Watch a sunrise or sunset in full. From start to finish.", diff: 2 },
  { cat: "Nature", text: "Find and sit under a tree for 30 minutes. Bring nothing.", diff: 1 },
  { cat: "Nature", text: "Go for a walk in the rain. Don't rush.", diff: 2 },
  { cat: "Nature", text: "Look at the night sky for 15 minutes. Find one constellation you can name.", diff: 1 },
];

let lastIndex = -1;

function rollQuest() {
  let idx;
  do { idx = Math.floor(Math.random() * quests.length); } while (idx === lastIndex);
  lastIndex = idx;

  const q = quests[idx];
  const card = document.getElementById('questCard');
  const btn = document.getElementById('questBtn');

  burstPixels(btn);

  document.getElementById('statusText').textContent = 'Loading quest...';

  document.getElementById('questCat').textContent = q.cat;
  document.getElementById('questText').textContent = q.text;

  let pips = 'Difficulty: ';
  for (let i = 1; i <= 3; i++) {
    pips += `<span class="pip ${i <= q.diff ? 'active' : ''}"></span>`;
  }
  document.getElementById('questDiff').innerHTML = pips;

  card.classList.add('visible');

  setTimeout(() => {
    document.getElementById('statusText').textContent = q.cat + ' quest assigned!';
  }, 300);
}

function burstPixels(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff','#ff8000','#800080'];

  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'px-spark';
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    const angle = Math.PI * 2 * i / 10 + (Math.random() - 0.5);
    const dist = 30 + Math.random() * 50;
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 650);
  }
}

// Status bar mouse coords
document.addEventListener('mousemove', (e) => {
  document.getElementById('statusCoords').textContent = e.clientX + ', ' + e.clientY;
});

document.getElementById('wizardWrap').addEventListener('click', rollQuest);
</script>
</body>
</html>
