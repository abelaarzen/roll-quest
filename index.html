<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidequest Wizard</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #008080;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    font-family: 'Patrick Hand', 'Comic Sans MS', 'Comic Sans', cursive;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* Classic Windows window chrome */
  .window {
    background: #c0c0c0;
    border-top: 2px solid #ffffff;
    border-left: 2px solid #ffffff;
    border-right: 2px solid #404040;
    border-bottom: 2px solid #404040;
    width: 100%;
    max-width: 560px;
    box-shadow: 2px 2px 0 #000000;
  }

  .title-bar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    font-weight: bold;
    font-size: 0.85rem;
    padding: 3px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }

  .title-bar-left {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .title-bar-icon {
    font-size: 1rem;
  }

  .title-bar-buttons {
    display: flex;
    gap: 2px;
  }

  .tb-btn {
    background: #c0c0c0;
    border-top: 1px solid #ffffff;
    border-left: 1px solid #ffffff;
    border-right: 1px solid #404040;
    border-bottom: 1px solid #404040;
    width: 16px;
    height: 14px;
    font-size: 0.6rem;
    line-height: 1;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    font-family: 'Comic Sans MS', cursive;
    font-weight: bold;
  }

  .menu-bar {
    background: #c0c0c0;
    padding: 2px 4px;
    font-size: 0.8rem;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid #808080;
  }

  .menu-item {
    padding: 1px 6px;
    cursor: default;
    color: #000;
  }

  .menu-item:hover {
    background: #000080;
    color: #fff;
  }

  /* Toolbar */
  .toolbar {
    background: #c0c0c0;
    padding: 4px 6px;
    display: flex;
    gap: 4px;
    align-items: center;
    border-bottom: 1px solid #808080;
    flex-wrap: wrap;
  }

  .tool-btn {
    background: #c0c0c0;
    border-top: 1px solid #ffffff;
    border-left: 1px solid #ffffff;
    border-right: 1px solid #404040;
    border-bottom: 1px solid #404040;
    width: 24px;
    height: 24px;
    font-size: 0.85rem;
    cursor: default;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tool-sep {
    width: 1px;
    height: 20px;
    background: #808080;
    margin: 0 2px;
  }

  /* Canvas area */
  .canvas-area {
    background: #c0c0c0;
    padding: 8px;
  }

  .paint-canvas {
    background: white;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  /* Wizard image */
  .wizard-wrap {
    position: relative;
    cursor: default;
    display: inline-block;
  }

  .wizard-img {
    width: 100%;
    max-width: 480px;
    height: auto;
    image-rendering: pixelated;
    display: block;
    transform-origin: 60% 80%;
    animation: wizard-wave 3.5s ease-in-out infinite;
  }

  @keyframes wizard-wave {
    0%   { transform: rotate(0deg) translateY(0px); }
    20%  { transform: rotate(1.5deg) translateY(-4px); }
    40%  { transform: rotate(-1deg) translateY(-7px); }
    60%  { transform: rotate(2deg) translateY(-3px); }
    80%  { transform: rotate(-0.5deg) translateY(-5px); }
    100% { transform: rotate(0deg) translateY(0px); }
  }

  /* Title */
  h1 {
    font-size: clamp(1.3rem, 5vw, 1.9rem);
    font-weight: bold;
    color: #000080;
    text-align: center;
    text-shadow: 2px 2px 0 #c0c0c0, 3px 3px 0 #808080;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 0.9rem;
    color: #800080;
    text-align: center;
    margin-top: -8px;
  }

  /* The quest button — main eyecatcher */
  .quest-btn {
    font-family: 'Patrick Hand', 'Comic Sans MS', 'Comic Sans', cursive;
    font-weight: bold;
    font-size: 1.6rem;
    color: #000060;
    background: linear-gradient(180deg, #ffe066 0%, #ffb800 50%, #e09000 100%);
    border-top: 3px solid #fff9aa;
    border-left: 3px solid #fff9aa;
    border-right: 3px solid #7a4800;
    border-bottom: 3px solid #7a4800;
    padding: 14px 36px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 3px 3px 0 #000, 0 0 18px 4px rgba(255,200,0,0.45);
    animation: btn-pulse 2.2s ease-in-out infinite;
    width: 100%;
    text-align: center;
  }

  @keyframes btn-pulse {
    0%, 100% { box-shadow: 3px 3px 0 #000, 0 0 12px 3px rgba(255,200,0,0.4); }
    50%       { box-shadow: 3px 3px 0 #000, 0 0 28px 8px rgba(255,220,0,0.7); }
  }

  .quest-btn:hover {
    background: linear-gradient(180deg, #fff099 0%, #ffd000 50%, #f0a800 100%);
  }

  .quest-btn:active {
    border-top: 3px solid #7a4800;
    border-left: 3px solid #7a4800;
    border-right: 3px solid #fff9aa;
    border-bottom: 3px solid #fff9aa;
    box-shadow: 1px 1px 0 #000;
    padding: 16px 34px 12px 38px;
    animation: none;
  }

  /* Quest card */
  .quest-card {
    width: 100%;
    background: white;
    border-top: 2px solid #808080;
    border-left: 2px solid #808080;
    border-right: 2px solid #ffffff;
    border-bottom: 2px solid #ffffff;
    padding: 22px 22px 18px;
    display: none;
    text-align: left;
    position: relative;
  }

  .quest-card.visible {
    display: block;
  }

  .quest-category {
    font-size: 0.8rem;
    font-weight: bold;
    color: #ffffff;
    background: #000080;
    padding: 2px 8px;
    display: inline-block;
    margin-bottom: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .quest-text {
    font-size: 1.35rem;
    line-height: 1.6;
    color: #000000;
    margin-bottom: 14px;
  }

  .quest-difficulty {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.8rem;
    color: #808080;
  }

  .quest-difficulty .pip {
    width: 12px;
    height: 12px;
    background: #c0c0c0;
    border-top: 1px solid #808080;
    border-left: 1px solid #808080;
    border-right: 1px solid #ffffff;
    border-bottom: 1px solid #ffffff;
  }

  .quest-difficulty .pip.active {
    background: #ff0000;
    border-top: 1px solid #ff8080;
    border-left: 1px solid #ff8080;
    border-right: 1px solid #800000;
    border-bottom: 1px solid #800000;
  }

  /* MS Paint color palette */
  .palette-bar {
    background: #c0c0c0;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    gap: 2px;
    border-top: 1px solid #808080;
    flex-wrap: wrap;
  }

  .palette-swatch {
    width: 14px;
    height: 14px;
    border-top: 1px solid #808080;
    border-left: 1px solid #808080;
    border-right: 1px solid #ffffff;
    border-bottom: 1px solid #ffffff;
    cursor: default;
    flex-shrink: 0;
  }

  /* Status bar */
  .status-bar {
    background: #c0c0c0;
    padding: 2px 6px;
    font-size: 0.7rem;
    color: #000;
    display: flex;
    gap: 8px;
    border-top: 1px solid #808080;
  }

  .status-panel {
    border-top: 1px solid #808080;
    border-left: 1px solid #808080;
    border-right: 1px solid #ffffff;
    border-bottom: 1px solid #ffffff;
    padding: 1px 6px;
  }

  /* Pixel sparkle */
  .px-spark {
    position: fixed;
    width: 4px;
    height: 4px;
    pointer-events: none;
    image-rendering: pixelated;
    animation: px-fly 0.6s steps(6) forwards;
    z-index: 9999;
  }

  @keyframes px-fly {
    0%   { opacity: 1; transform: translate(0,0); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)); }
  }
</style>
</head>

    <div class="palette-swatch" style="background:#ff8080"></div>
    <div class="palette-swatch" style="background:#c0c0c0"></div>
    <div class="palette-swatch" style="background:#ffffff; border-color:#808080 #fff #fff #808080"></div>
  </div>

  <!-- Status bar -->

    <div class="status-panel" id="statusText">Ready</div>
    <div class="status-panel" id="statusCoords">0, 0</div>
    <div class="status-panel">420x420</div>
  </div>

</div>

let lastIndex = -1;

function rollQuest() {
  let idx;
  do { idx = Math.floor(Math.random() * quests.length); } while (idx === lastIndex);
  lastIndex = idx;

  const q = quests[idx];
  const card = document.getElementById('questCard');
  const btn = document.getElementById('questBtn');

  burstPixels(btn);

  document.getElementById('statusText').textContent = 'Loading quest...';

  document.getElementById('questCat').textContent = q.cat;
  document.getElementById('questText').textContent = q.text;

  let pips = 'Difficulty: ';
  for (let i = 1; i <= 3; i++) {
    pips += `<span class="pip ${i <= q.diff ? 'active' : ''}"></span>`;
  }
  document.getElementById('questDiff').innerHTML = pips;

  card.classList.add('visible');

  setTimeout(() => {
    document.getElementById('statusText').textContent = q.cat + ' quest assigned!';
  }, 300);
}

function burstPixels(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff','#ff8000','#800080'];

  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'px-spark';
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    const angle = Math.PI * 2 * i / 10 + (Math.random() - 0.5);
    const dist = 30 + Math.random() * 50;
    s.style.left = cx + 'px';
    s.style.top = cy + 'px';
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 650);
  }
}

// Status bar mouse coords
document.addEventListener('mousemove', (e) => {
  document.getElementById('statusCoords').textContent = e.clientX + ', ' + e.clientY;
});

document.getElementById('wizardWrap').addEventListener('click', rollQuest);
